# Executive Competitor Analysis — client set for CXO report
# Used when executive_competitor_analysis.use_this_file is true (see dev.yaml).
# Trading set: Zerodha, Dhan, Groww, Kotak Securities, Sahi (competitors cross-linked).
# Political portfolio: Narendra Modi (same block as config/clients.yaml) so /clients UI can switch verticals.

clients:
  - name: Sahi
    domain: sahi.com
    aliases:
      - sahi
      - sahi trading
      - sahi trading app
      - sahi brokerage
      - sahi derivatives
      - sahi investment app
      - sahi trading platform
      - sahi options trading
      - sahi app
      - sahi fintech
      - sahi stock trading
      - sahi broker
      - sahi investing platform
      - sahi discount broker
      - sahi capital markets
      - sahi retail trading app
      - sahi derivatives trading
      - sahi markets platform
    ignore_patterns:
      - sahi hai
      - bilkul sahi
      - sahi baat
      - bilkul sahi hai
      - sahi kaha
      - theek sahi
      - sahi ai app
      - sahi bola
    competitors:
      - name: Zerodha
      - name: Dhan
      - name: Groww
      - name: Kotak Securities

  - name: Zerodha
    domain: zerodha.com
    aliases:
      - zerodha
      - zerodha kite
      - kite
      - kite trading
      - kite trading app
      - zerodha brokerage
      - zerodha trading platform
      - zerodha demat
