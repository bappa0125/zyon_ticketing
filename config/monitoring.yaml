# Social data guardrails — protects MongoDB and reduces scraping costs
# Loaded with dev.yaml / prod.yaml

monitoring:
  entity_detection:
    ignore_patterns:
      - sahi hai
      - bilkul sahi
      - sahi bola
    entity_aliases:
      Zerodha:
        - zerodha
        - zerodha kite
        - kite app
      Upstox:
        - upstox
      Groww:
        - groww
        - grow app
  reddit:
    enabled: true
    actor: "trudax/reddit-scraper"
    max_items_per_run: 20
  youtube:
    enabled: true
    actor: "streamers/youtube-scraper"
    max_items_per_run: 10
  social_sources:
    twitter: true
    youtube: false
  apify:
    max_items_per_run: 50
    twitter_actor: "61RPP7dywgiy0JPD0"
    twitter_input_style: apify_official
    twitter_sort: Latest
    twitter_tweet_language: en
    twitter_search_terms:
      - "Narendra Modi"
      - "PM Modi"
    twitter_handles:
      - narendramodi
  social_data:
    retention_days: 30
    max_posts_per_entity_per_day: 100
    engagement_thresholds:
      likes: 0
      retweets: 0
      comments: 0
    deduplication:
      enabled: true
      hash_algorithm: md5

  ingestion:
    batch_size: 20

  rss_ingestion:
    freshness_window_hours: 72

  crawling:
    interval_minutes: 30
