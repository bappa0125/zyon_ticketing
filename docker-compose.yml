# AI Chatbot Platform - Local Development
# Run: docker compose up

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=dev
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - APIFY_API_KEY=${APIFY_API_KEY:-}
    depends_on:
      - mongodb
      - redis
      - qdrant
    restart: unless-stopped

  media_index_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - APP_ENV=dev
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - HF_TOKEN=${HF_TOKEN:-}
    command: ["python", "scripts/media_index_scheduler.py"]
    depends_on:
      - mongodb
      - redis
      - qdrant
    restart: unless-stopped

  crawler_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    environment:
      - APP_ENV=dev
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - crawler_snapshots:/app/data/snapshots
    depends_on:
      - mongodb
      - redis
      - qdrant
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
  qdrant_data:
  crawler_snapshots:
