# AI Search Visibility — prompt groups (Political)
# Adapted for Nrendra Modi vs competitors narrative tracking

prompt_groups:

  - id: leader_discovery
    name: "Political leader discovery queries"
    prompts:
      - "Best political leader in India"
      - "Top political leaders in India 2026"
      - "Most popular leader in India"
      - "Who is leading India politically"
      - "Top politicians in India today"
      - "Most influential Indian political leaders"
      - "Who is the strongest leader in India"
      - "Best prime minister India history"

  - id: modi_alternatives
    name: "Modi alternative queries"
    prompts:
      - "Alternatives to Narendra Modi"
      - "Leaders better than Modi India"
      - "Who can replace Modi as PM"
      - "Opposition leaders vs Modi"
      - "Best alternative to BJP leadership"
      - "Who is better than Modi in India"
      - "Next PM candidates India"

  - id: feature_driven
    name: "Leadership attribute queries"
    prompts:
      - "Best leader for economic growth India"
      - "Strongest leader for governance India"
      - "Leader with best development record India"
      - "Most decisive political leader India"
      - "Leader with best policies India"
      - "Who is best for India’s future leadership"
      - "Best leader for reforms in India"

  - id: problem_driven
    name: "Problem-driven political queries"
    prompts:
      - "Who can fix unemployment in India"
      - "Best leader to improve Indian economy"
      - "Who can control inflation India"
      - "Leader best for job creation India"
      - "Who handles corruption best in India"
      - "Best leader for middle class India"
      - "Who can improve governance in India"

  - id: leader_comparison
    name: "Political comparison queries"
    prompts:
      - "Modi vs Kejriwal who is better"
      - "Modi vs Rahul Gandhi comparison"
      - "Mamta Banerjee vs Modi leadership"
      - "Stalin vs Modi governance"
      - "Top Indian leaders comparison"
      - "Best CM vs PM comparison India"
      - "Who is better Modi or opposition leaders"