# Development configuration
# Loaded when APP_ENV=dev

# Ingestion scheduler (runs in backend process)
scheduler:
  enabled: true
  rss_interval_hours: 1              # Run RSS every 1h to catch new URLs more often
  rss_max_feeds_per_run: 35          # More feeds per run = more new items per cycle
  article_fetcher_interval_minutes: 10
  article_fetcher_max_items_per_run: 40  # rss_items (status=new) to fetch per run
  entity_mentions_interval_minutes: 15
  entity_mentions_batch_size: 150  # Unprocessed-first; drain backlog without blocking
  entity_mentions_sentiment_interval_minutes: 20  # VADER sentiment on new entity_mentions
  # AI summaries: once/day, 25+25 batch to stay under OpenRouter free tier (~50 calls/day)
  ai_summary_interval_hours: 24
  ai_summary_batch_size: 25
  article_topics_interval_minutes: 60
  article_topics_batch_size: 30
  reddit_interval_minutes: 120
  youtube_interval_minutes: 120
  crawler_enqueue_interval_minutes: 30
  forum_ingestion_interval_minutes: 360

# Temporary: stream pipeline steps to the UI when user asks a question (set to false to disable)
chat:
  debug_step_stream: true

app:
  name: zyon-chatbot
  env: dev
  debug: true

server:
  host: 0.0.0.0
  port: 8000

mongodb:
  url: mongodb://mongodb:27017
  database: chat
  conversations_collection: conversations
  messages_collection: messages

redis:
  url: redis://redis:6379/0

qdrant:
  url: http://qdrant:6333
  collection: chat_embeddings
  vector_size: 384

openrouter:
  base_url: https://openrouter.ai/api/v1
  model: openrouter/free
  # Perplexity Sonar does web search natively - no plugin needed
  web_search_model: perplexity/sonar
  embedding_model: sentence-transformers/all-MiniLM-L6-v2

embedding:
  model: sentence-transformers/all-MiniLM-L6-v2
  dimension: 384

frontend:
  url: http://localhost:3000

crawler:
  frequency_minutes: 30
  page_timeout_ms: 15000
  user_agent: "ZyonCompetitorMonitor/1.0"
  qdrant_page_collection: page_embeddings
  change_similarity_threshold: 0.85
  # Streaming + lazy architecture
  snapshot_dir: /app/data/snapshots
  snapshots_per_page: 20
  # Playwright resource control
  browser_instances: 1
  concurrent_pages: 2
  block_images: true
  block_videos: true
  block_fonts: true
  block_tracking: true
  # Embedding optimization
  embedding_batch_size: 4
  # Worker limits
  max_simultaneous_jobs: 2

llm:
  model: openrouter/free
  fallback_model: meta-llama/llama-3.2-3b-instruct:free
  max_tokens: 400

# AI brief (PR recommendations) - guarded to stay under free tier
reports_ai:
  ai_brief_enabled: true
  ai_brief_model: openrouter/free
  ai_brief_max_tokens: 350
  ai_brief_max_per_day: 10
  ai_brief_ttl_hours_24h: 6
  ai_brief_ttl_hours_7d: 24
  ai_brief_ttl_hours_30d: 48
  ai_brief_max_topics: 12
  ai_brief_max_headlines: 20

qdrant_optimization:
  on_disk: true
  payload_compression: true

media_mention:
  rerank_model: openai/gpt-3.5-turbo

url_discovery:
  tavily_api_key: ""  # Optional - set TAVILY_API_KEY env
  cache_ttl_hours: 6
  max_results: 10
  max_validation_pages: 5
  rate_limit_per_minute: 3

# Reddit trending pipeline (separate from Apify/social_posts). Uses Reddit JSON API + LLM.
reddit_trending:
  enabled: true
  # Subreddits: India + global trading/investing
  subreddits:
    - IndianStreetBets
    - IndiaInvestments
    - IndianStockMarket
    - stocks
    - investing
    - wallstreetbets
    - options
    - BogleHeads
    - StockMarket
  sort: hot          # hot | new | top
  top_period: day    # day | week (only if sort=top)
  posts_per_subreddit: 20
  delay_seconds_between_subreddits: 1.5  # Respect Reddit rate limit
  user_agent: "ZyonRedditTrending/1.0"
  # MongoDB: separate collections (same DB as app)
  mongodb:
    database: chat
    posts_collection: reddit_trending_posts
    summaries_collection: reddit_trending_summaries
  # Redis: separate key namespace
  redis:
    key_prefix: "reddit_trending"
    posts_ttl_seconds: 1800       # 30 min
    themes_ttl_seconds: 3600      # 1 h
    sahi_suggestions_ttl_seconds: 3600
  # LLM (OpenRouter free tier)
  llm:
    model: openrouter/free
    max_tokens_themes: 400
    max_tokens_sahi: 400
  # Scheduler
  fetch_interval_minutes: 45
