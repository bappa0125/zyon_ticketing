# Narrative taxonomy — Political CXO Intelligence (Nrendra Modi)

version: 2
max_tags_per_mention: 2

forum_narrative_frame:
  surface: forum
  role_in_narrative: amplifier
  description: >
    Forums amplify and stress-test narratives formed in media and leadership messaging.
    Use forum_site + narrative_tags to identify narrative momentum and gaps vs competitors.

tags:

  # ------------------------------------------------
  # CORE LEADERSHIP & GOVERNANCE
  # ------------------------------------------------

  - id: governance_administration
    label: Governance & execution
    description: Effectiveness of governance, execution capability
    keywords:
      - governance
      - administration
      - policy implementation
      - execution
      - governance model
      - decision making
      - government performance

  - id: leadership_image
    label: Leadership strength & image
    description: Strong leader perception, decisiveness, authority
    keywords:
      - strong leader
      - decisive leader
      - leadership style
      - powerful leader
      - global leader
      - popularity
      - leadership image

  - id: policy_reforms
    label: Policy & reforms
    description: Structural reforms, laws, policy direction
    keywords:
      - reform
      - new policy
      - bill
      - law
      - regulation
      - reform agenda
      - policy change


  # ------------------------------------------------
  # MACRO ECONOMY (CRITICAL)
  # ------------------------------------------------

  - id: economy_macro
    label: Economy & macro performance
    description: GDP, inflation, jobs, economic strength
    keywords:
      - indian economy
      - gdp growth
      - inflation india
      - unemployment
      - jobs
      - economic growth
      - fiscal deficit
      - economy outlook
      - economic performance

  - id: development_infra
    label: Development & infrastructure
    description: Infra projects, growth, public works
    keywords:
      - infrastructure
      - development
      - highways
      - railways
      - smart city
      - urban development
      - rural development

  - id: welfare_schemes
    label: Welfare & schemes
    description: Public welfare programs, subsidies
    keywords:
      - scheme
      - yojana
      - subsidy
      - welfare
      - benefits
      - government scheme


  # ------------------------------------------------
  # GEOPOLITICS & DEFENSE (HIGH IMPACT)
  # ------------------------------------------------

  - id: geopolitics
    label: Geopolitics & global positioning
    description: India's global role, diplomacy, alliances
    keywords:
      - geopolitics
      - foreign policy
      - india global position
      - diplomacy
      - international relations
      - india us relations
      - india china
      - india russia
      - global influence

  - id: defense_security
    label: Defense & national security
    description: Military strength, security, borders
    keywords:
      - national security
      - defense india
      - indian army
      - military strength
      - border security
      - defense policy
      - armed forces


  # ------------------------------------------------
  # POLITICAL COMPETITION & POWER
  # ------------------------------------------------

  - id: election_politics
    label: Elections & political strategy
    description: Elections, campaigns, power dynamics
    keywords:
      - election
      - campaign
      - vote
      - voting
      - lok sabha
      - assembly election
      - manifesto
      - political strategy

  - id: opposition_positioning
    label: Opposition & competition
    description: Rival leaders, comparison narratives
    keywords:
      - opposition
      - vs
      - comparison
      - better than
      - vs kejriwal
      - vs rahul gandhi
      - vs mamta
      - vs stalin

  - id: corruption_transparency
    label: Corruption & accountability
    description: Corruption allegations, governance integrity
    keywords:
      - corruption
      - scam
      - transparency
      - accountability
      - fraud
      - allegation


  # ------------------------------------------------
  # MEDIA & NARRATIVE CONTROL
  # ------------------------------------------------

  - id: media_narrative
    label: Media narrative & bias
    description: Media framing, bias, propaganda
    keywords:
      - media bias
      - propaganda
      - narrative
      - news coverage
      - biased media
      - fake news
      - media agenda


  # ------------------------------------------------
  # SOCIETAL & IDENTITY POLITICS
  # ------------------------------------------------

  - id: religion_identity
    label: Religion & identity politics
    description: Religious, caste, identity narratives
    keywords:
      - religion
      - caste
      - identity politics
      - hindu
      - muslim
      - minority
      - majority
      - communal

  - id: youth_jobs_education
    label: Youth, jobs & education
    description: Youth issues, employment, education
    keywords:
      - jobs
      - youth
      - unemployment
      - education
      - students
      - job creation
      - skill development