      - name: Sahi
      - name: Dhan
      - name: Groww
      - name: Kotak Securities

  - name: Dhan
    domain: dhan.co
    aliases:
      - dhan
      - dhan trading
      - dhan brokerage
      - dhan app
      - dhan trading platform
    ignore_patterns:
      - dhanteras
      - dhan yog
      - dhan astrology
      - dhan mantra
      - dhan festival
      - dhanush
    competitors:
      - name: Sahi
      - name: Zerodha
      - name: Groww
      - name: Kotak Securities

  - name: Groww
    domain: groww.in
    aliases:
      - groww
      - groww app
      - groww investment app
      - groww trading
      - groww brokerage
      - groww demat
    ignore_patterns:
      - grow
      - growing
      - grow business
      - grow revenue
      - grow your wealth
      - grow your business
      - grow economy
    competitors:
      - name: Sahi
      - name: Zerodha
      - name: Dhan
      - name: Kotak Securities

  - name: Kotak Securities
    domain: kotaksecurities.com
