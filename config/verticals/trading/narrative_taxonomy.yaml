# Narrative taxonomy — rule-based tags for mentions (forums, articles).
# Objective: narrative source / amplifier / positioning: tag WHAT is being discussed,
# then aggregate by forum_site, source_domain, entity.
#
# Forums in scope: TradingQnA, ValuePickr, Hacker News (via RSS feed_domain).

version: 1
max_tags_per_mention: 2

# For forum rows, role_in_frame explains how to read the row in CXO narrative work.
forum_narrative_frame:
  surface: forum
  role_in_narrative: amplifier
  description: >
    Community threads amplify, debate, and redistribute narratives that often
    start in publications or creator channels. Use forum_site + narrative_tags
    for “where discussion clusters” and gap vs rivals.

tags:
  - id: pricing_charges
    label: Pricing & charges
    description: Cost to trade, plans, free brokerage, AMC, hidden fees
    keywords:
