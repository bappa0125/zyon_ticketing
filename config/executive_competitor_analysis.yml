      - kotak bank
      - kotak insurance
      - kotak mutual fund
      - kotak credit card
    competitors:
      - name: Sahi
      - name: Zerodha
      - name: Dhan
      - name: Groww

  - name: Narendra Modi
    domain: narendramodi.in
    report_timezone: Asia/Kolkata
    vertical: political
    features:
      forums: false
      youtube: true
      reddit: true
      twitter: true
      twitter_schema: political
    aliases:
      - narendra modi
      - pm modi
      - prime minister modi
      - modi government
      - bjp modi
    ignore_patterns:
      - narendra modi stadium
      - modi script
