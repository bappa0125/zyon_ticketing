# Production configuration
# Loaded when APP_ENV=prod
# Values overridden by environment variables in AWS

# Ingestion scheduler (runs in backend process)
scheduler:
  enabled: true
  rss_interval_hours: 4
  article_fetcher_interval_minutes: 10
  entity_mentions_interval_minutes: 15
  ai_summary_interval_hours: 24
  ai_summary_batch_size: 25
  reddit_interval_minutes: 120
  youtube_interval_minutes: 120
  youtube_official_interval_minutes: 360
  crawler_enqueue_interval_minutes: 30
  forum_ingestion_interval_minutes: 360
  entity_mentions_sentiment_interval_minutes: 20
  article_topics_interval_minutes: 60
  article_topics_batch_size: 30

# Step stream disabled in production (enable only for debugging)
chat:
  debug_step_stream: false

app:
  name: zyon-chatbot
  env: prod
  debug: false

server:
  host: 0.0.0.0
  port: 8000

# Production URLs come from env vars: MONGODB_URL, REDIS_URL, QDRANT_URL
mongodb:
  url: ${MONGODB_URL}
  database: chat
  conversations_collection: conversations
  messages_collection: messages

redis:
  url: ${REDIS_URL}

qdrant:
  url: ${QDRANT_URL}
  collection: chat_embeddings
  vector_size: 384

openrouter:
  base_url: https://openrouter.ai/api/v1
  model: ${OPENROUTER_MODEL:-openai/gpt-3.5-turbo}
  embedding_model: sentence-transformers/all-MiniLM-L6-v2

embedding:
  model: sentence-transformers/all-MiniLM-L6-v2
  dimension: 384

# AI brief (PR recommendations) - guarded to stay under free tier
reports_ai:
  ai_brief_enabled: true
  ai_brief_model: ${OPENROUTER_MODEL:-openai/gpt-3.5-turbo}
  ai_brief_max_tokens: 350
  ai_brief_max_per_day: 10
  ai_brief_ttl_hours_24h: 6
  ai_brief_ttl_hours_7d: 24
  ai_brief_ttl_hours_30d: 48
  ai_brief_max_topics: 12
  ai_brief_max_headlines: 20

# Reddit trending pipeline (separate from Apify/social_posts)
reddit_trending:
  enabled: true
  subreddits:
    - IndianStreetBets
    - IndiaInvestments
    - IndianStockMarket
    - stocks
    - investing
    - wallstreetbets
    - options
    - BogleHeads
    - StockMarket
  sort: hot
  top_period: day
  posts_per_subreddit: 20
  delay_seconds_between_subreddits: 1.5
  user_agent: "ZyonRedditTrending/1.0"
  mongodb:
    database: chat
    posts_collection: reddit_trending_posts
    summaries_collection: reddit_trending_summaries
  redis:
    key_prefix: "reddit_trending"
    posts_ttl_seconds: 1800
    themes_ttl_seconds: 3600
    sahi_suggestions_ttl_seconds: 3600
  llm:
    model: openrouter/free
    max_tokens_themes: 400
    max_tokens_sahi: 400
  fetch_interval_minutes: 45

# YouTube narrative pipeline (daily, YouTube Data API v3, 1 LLM call)
youtube_trending:
  enabled: true
  api_key: ""  # Set YOUTUBE_API_KEY env
  search_queries:
    - stock market trading
    - options trading
    - commodity market
    - finance news India
  max_videos_per_query: 12
  delay_seconds_between_searches: 1.0
  mongodb:
    database: chat
    videos_collection: youtube_narrative_videos
    summaries_collection: youtube_narrative_summaries
  llm:
    model: openrouter/free
    max_tokens: 800

youtube_official:
  enabled: true
  api_key: ""
  mongodb:
    database: chat
    collection: youtube_intel_videos
  max_total_videos_per_run: 35
  max_channels_per_run: 5
  max_playlist_items_per_channel: 12
  max_searches_per_run: 2
  max_results_per_search: 15
  search_order: date
  discovery_search_queries:
    - stock market India news
    - commodity trading India
  monitor_channel_ids: []
  delay_seconds_between_api_calls: 0.5
  max_videos_for_comment_fetch: 0
  max_comment_threads_per_video: 12

narrative_shift:
  enabled: true
  youtube_queries:
    - stock market
    - options trading
    - commodity
  reddit_subreddits:
    - stocks
    - investing
    - IndianStreetBets
    - wallstreetbets
  llm:
    model: openrouter/free

narrative_intelligence_daily:
  enabled: true
  llm:
    model: openrouter/free

narrative_positioning:
  enabled: true
  llm:
    model: openrouter/free

narrative_briefing:
  enabled: true
  range_days: 30

forum_theme_digest:
  enabled: true
  range_days: 7
  max_documents: 2500
  max_reddit_posts: 2000
  include_reddit: true
  top_threads_per_theme: 6
  min_text_len: 40
  forum_sites:
    - valuepickr
    - tradingqna
    - traderji
